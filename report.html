<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ゲーム体験 結果レポート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans JP',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:1.5rem 1rem}
    .container{max-width:800px;margin:0 auto}
    .header{background:linear-gradient(135deg,#1e293b,#0f3460);border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;border-left:4px solid #e8a44a}
    .header h1{font-size:1.4rem;color:#e8a44a;margin-bottom:0.3rem}
    .header p{font-size:0.85rem;color:#94a3b8}
    .section{background:#1e293b;border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1rem}
    .section h2{font-size:0.95rem;color:#e8a44a;border-bottom:1px solid #334155;padding-bottom:0.5rem;margin-bottom:0.8rem}
    .section .inst{font-size:0.78rem;color:#94a3b8;margin-bottom:0.8rem;line-height:1.5}
    table{width:100%;border-collapse:collapse;font-size:0.8rem}
    thead tr{background:#0f172a}
    th,td{padding:0.4rem 0.5rem;border:1px solid #334155;text-align:center;vertical-align:middle}
    th.q,td.q{text-align:left;width:58%}
    td.score{color:#e2e8f0}
    td.na{color:#475569}
    td.plus{color:#4ade80;font-weight:700}
    td.minus{color:#f87171;font-weight:700}
    td.zero{color:#94a3b8}
    tr:nth-child(even){background:rgba(255,255,255,0.03)}
    .card-list{list-style:none;padding:0}
    .card-list li{padding:0.3rem 0.6rem;border-left:3px solid #e8a44a;margin-bottom:0.35rem;font-size:0.82rem;background:rgba(255,255,255,0.04);border-radius:0 6px 6px 0}
    .story-item{margin-bottom:0.7rem;padding:0.5rem 0.7rem;background:rgba(255,255,255,0.04);border-radius:6px;font-size:0.82rem}
    .story-title{color:#e8a44a;font-weight:600;margin-bottom:0.25rem;font-size:0.8rem}
    .comment-box{background:rgba(255,255,255,0.04);border-radius:6px;padding:0.8rem;font-size:0.82rem;line-height:1.6;white-space:pre-wrap}
    .no-data{color:#475569;font-size:0.82rem}
    .loading{text-align:center;padding:3rem;color:#94a3b8}
    .error{text-align:center;padding:2rem;color:#f87171}
    .code-form{background:#1e293b;border-radius:16px;padding:2rem;max-width:480px;margin:4rem auto;text-align:center}
    .code-form h1{font-size:1.3rem;color:#e8a44a;margin-bottom:0.5rem}
    .code-form p{font-size:0.85rem;color:#94a3b8;margin-bottom:1.2rem}
    .code-form input{width:100%;padding:0.7rem 1rem;font-size:1rem;border-radius:8px;border:1.5px solid #e8a44a;background:#0f172a;color:#fff;margin-bottom:0.8rem;text-align:center}
    .code-form button{background:linear-gradient(135deg,#e8a44a,#c47f2a);color:#fff;border:none;padding:0.7rem 2rem;font-size:1rem;border-radius:8px;cursor:pointer;width:100%}
  </style>
</head>
<body>
<div class="container">
  <div id="app"><div class="loading">読み込み中...</div></div>
</div>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbwmCBURkSOU-2zMqJs9KNaeU8goohM0bSIsklu7oxyDhJQtLj6GEKa1TMVmAm3NRgoYQg/exec";

var SWLS_Q = ["私は自分の人生に満足している。","私の人生は、とても素晴らしい状態だ。","大体において、私の人生は理想に近い。","私はこれまで、自分の人生に求める大切なものを得てきた。","もう一度人生をやり直せるとしても、ほとんど何も変えないだろう。"];
var MEANING_Q = ["私の人生は価値に満ちている。","自分が存在していることには意味がある。","毎日、生きていることに価値があると感じる。"];
var CSES_Q = ["つらい問題を小さな部分に分けて考える。","変更できることと変更できないことを整理する。","不快な考えを頭から追い払う。","不快な考えから気をそらす。","不快な考えで動揺しないようにする。","問題に直面したとき、行動計画を立てて実行する。","悲しい気持ちにならないようにする。","ストレスを感じたとき、選択肢を残しておく。","問題の一つひとつに分けて考える。","最も困難な問題の解決策を見つける。","必要なことを友人に手伝ってもらう。","家族や友人から情緒的な支援を得る。","友人をつくる。"];
var SRGS_Q = ["他者への接し方に変化を感じた。","自分の意思で決定できる自由さに変化を感じた。","人生について他者に教えられる価値が自分にあるという信念に変化を感じた。","他人が望む自分ではなく、本来の自分でいられるかどうかに変化を感じた。","問題に取り組み、あきらめずに対処する態度に変化を感じた。","人生に意味を見いだせるかどうかに変化を感じた。","他者に手を差し伸べ、助けようとする気持ちに変化を感じた。","自分に対する自信に変化を感じた。","他者が話しているときに耳を傾ける態度に変化を感じた。","新しい情報や考えに対して開かれているかどうかに変化を感じた。","他者と率直にコミュニケーションしようとする態度に変化を感じた。","世界に何らかの影響を与えたいという欲求に変化を感じた。","他者に助けを求めてもよいという信念に変化を感じた。","自分の権利を主張する気持ちに変化を感じた。","自分を気にかけてくれる人の数についての信念に変化を感じた。"];
var APTS_Q = ["楽しい時間を過ごすことは大切だと思う。","楽しむことは、私の人生においてとても重要だ。","何をしていても、楽しもうとする。","どんな活動でも、自分なりに楽しくすることができる。","たいていの状況で、楽しみを見つけることができる。","その場で楽しいことを始めるのは、たいてい自分だ。","他の人が始めた楽しいことを喜んで受け入れる。","誰かが楽しいことを始めたら、喜んで一緒に加わる。","他の人が始めた楽しいことを楽しめる。","何かしたいと思ったら、他の人にどう思われるかで止めることはあまりない。","結果を気にせずに行動できることがある。","社会のルールは理解しているが、たいていの場合それに縛られない。","ばかげたことをしても、何かを失うとは思わない。","いつもルールに従うわけではない。","計画にないことをよくする。","その場の思いつきで行動することがよくある。","衝動的に行動することがよくある。","そのときの気分にまかせて動くことがよくある。","ふと浮かんだ考えをそのまま追いかけることがよくある。"];
var ARCS_Q = ["本ゲームのクオリティが、注意を引きつけるのに役立った。","本ゲームにおける情報の提示の仕方が、注意を持続させるのに役立った。","本ゲームの場面、課題、演出などの多様さが、注意を持続させるのに役立った。","本ゲームの内容が、自分がすでに知っていることとどう関連しているかが明確だった。","本ゲームの内容と表現のしかたから、この学習に取り組む価値があると感じられた。","本ゲームの内容は自分にとって役立つものだった。","本ゲームに取り組む中で、学習内容をうまく身につけられると自信が持てた。","本ゲームにしばらく取り組んだ後、課題をやり遂げられると自信が持てた。","本ゲームの内容がよく整理されていたので、学習内容を習得できると自信が持てた。","本ゲームに取り組むのが楽しく、もっと続けたいと感じた。","本ゲームに取り組むのはとても楽しかった。","このようによくできたゲームに取り組めたことは喜ばしかった。"];

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function diffCell(pre, post) {
  if (pre === null || post === null) return '<td class="na">—</td>';
  var d = post - pre;
  var cls = d > 0 ? 'plus' : (d < 0 ? 'minus' : 'zero');
  return '<td class="' + cls + '">' + (d > 0 ? '+' : '') + d + '</td>';
}

function compareTable(title, inst, questions, pairs) {
  var rows = questions.map(function(q, i) {
    var p = pairs[i] || {};
    var pre = p.pre !== null && p.pre !== undefined ? p.pre : null;
    var post = p.post !== null && p.post !== undefined ? p.post : null;
    return '<tr><td class="q">' + esc(q) + '</td>'
      + (pre !== null ? '<td class="score">' + pre + '</td>' : '<td class="na">—</td>')
      + (post !== null ? '<td class="score">' + post + '</td>' : '<td class="na">—</td>')
      + diffCell(pre, post) + '</tr>';
  }).join('');
  return '<div class="section"><h2>' + esc(title) + '</h2>'
    + (inst ? '<p class="inst">' + esc(inst) + '</p>' : '')
    + '<table><thead><tr><th class="q">質問</th><th>事前</th><th>事後</th><th>変化</th></tr></thead><tbody>'
    + rows + '</tbody></table></div>';
}

function singleTable(title, inst, questions, scores, label) {
  var rows = questions.map(function(q, i) {
    var v = scores[i] !== null && scores[i] !== undefined ? scores[i] : null;
    return '<tr><td class="q">' + esc(q) + '</td>'
      + (v !== null ? '<td class="score">' + v + '</td>' : '<td class="na">—</td>') + '</tr>';
  }).join('');
  return '<div class="section"><h2>' + esc(title) + '</h2>'
    + (inst ? '<p class="inst">' + esc(inst) + '</p>' : '')
    + '<table><thead><tr><th class="q">質問</th><th>' + label + '</th></tr></thead><tbody>'
    + rows + '</tbody></table></div>';
}

function renderReport(data) {
  var html = '<div class="header"><h1>ゲーム体験 結果レポート</h1><p>匿名コード: ' + esc(data.code) + '</p></div>';

  html += compareTable('§1. 人生満足度（SWLS）― 1〜7点', '以下の文は、あなたの人生全般に対する満足度をたずねるものです。', SWLS_Q, data.swls);
  html += compareTable('§2. 人生の意味（Meaning）― 1〜7点', null, MEANING_Q, data.meaning);
  html += compareTable('§3. 問題対処への自信（CSES）― 0〜10点', '物事がうまくいかないときや、問題を抱えているとき、以下のことをどのくらい自信を持ってできますか。', CSES_Q, data.cses);
  html += compareTable('§4. 外傷後成長実感（SRGS）― 0〜6点', 'これまでに経験したストレスフルな出来事の結果、どのような変化があったかをお答えください。', SRGS_Q, data.srgs);
  html += singleTable('§5. プレイフルネス（APTS）― 1〜6点（事前のみ）', '以下は、人々やその考え方全般を表す文です。', APTS_Q, data.apts, '事前');
  html += singleTable('§6. ゲームへの動機づけ（ARCS）― 1〜7点（事後のみ）', 'このゲームを用いた教育プログラムが、あなたの学習への動機づけや取り組みの維持にどの程度役立ったかをお答えください。', ARCS_Q, data.arcs, '事後');

  html += '<div class="section"><h2>ゲーム体験の記録</h2>';
  if (data.game) {
    html += '<p style="font-size:0.85rem;color:#94a3b8;margin-bottom:0.5rem;margin-top:0.3rem">作成したカード（Stage 1）</p>';
    var cards = data.game.cards ? data.game.cards.split(' | ').filter(function(s){return s.trim();}) : [];
    if (cards.length) {
      html += '<ul class="card-list">' + cards.map(function(c){return '<li>'+esc(c.trim())+'</li>';}).join('') + '</ul>';
    } else { html += '<p class="no-data">記録なし</p>'; }

    html += '<p style="font-size:0.85rem;color:#94a3b8;margin:0.8rem 0 0.5rem">書いたストーリー（Stage 2）</p>';
    var stories = data.game.stories ? data.game.stories.split(' || ').filter(function(s){return s.trim();}) : [];
    if (stories.length) {
      html += stories.map(function(s){
        var parts = s.split(' → ');
        return '<div class="story-item"><div class="story-title">'+esc((parts[0]||'').trim())+'</div>'+(parts[1]?'<div>'+esc(parts[1].trim())+'</div>':'')+'</div>';
      }).join('');
    } else { html += '<p class="no-data">記録なし</p>'; }

    html += '<p style="font-size:0.85rem;color:#94a3b8;margin:0.8rem 0 0.5rem">失ったカードの順番（Stage 3）</p>';
    var lost = data.game.lost ? data.game.lost.split(' | ').filter(function(s){return s.trim();}) : [];
    if (lost.length) {
      html += '<ul class="card-list">' + lost.map(function(c){return '<li>'+esc(c.trim())+'</li>';}).join('') + '</ul>';
    } else { html += '<p class="no-data">記録なし</p>'; }
  } else {
    html += '<p class="no-data">ゲーム行動データが見つかりませんでした。</p>';
  }
  html += '</div>';

  if (data.comment) {
    html += '<div class="section"><h2>感想（自由記述）</h2><div class="comment-box">' + esc(data.comment) + '</div></div>';
  }

  document.getElementById('app').innerHTML = html;
}

function showCodeForm() {
  document.getElementById('app').innerHTML =
    '<div class="code-form"><h1>ゲーム体験 結果レポート</h1>'
    + '<p>体験前アンケートで作成した匿名コードを入力してください</p>'
    + '<input type="text" id="codeInput" placeholder="例: 0101111" maxlength="10">'
    + '<button onclick="loadReport(document.getElementById(\'codeInput\').value)">レポートを表示</button></div>';
}

function loadReport(code) {
  code = (code || '').trim().replace(/-/g, '');
  if (!code) { showCodeForm(); return; }
  document.getElementById('app').innerHTML = '<div class="loading">データを取得中...</div>';
  var cb = 'cb_' + Date.now();
  window[cb] = function(data) {
    delete window[cb];
    document.getElementById('script_jsonp') && document.getElementById('script_jsonp').remove();
    if (data.error === 'not_found') {
      document.getElementById('app').innerHTML = '<div class="error"><p>コード「' + esc(code) + '」のデータが見つかりませんでした。</p><button onclick="showCodeForm()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:#e8a44a;color:#fff;border:none;border-radius:8px;cursor:pointer">戻る</button></div>';
    } else if (data.error) {
      document.getElementById('app').innerHTML = '<div class="error"><p>エラーが発生しました。</p><button onclick="showCodeForm()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:#e8a44a;color:#fff;border:none;border-radius:8px;cursor:pointer">戻る</button></div>';
    } else {
      renderReport(data);
    }
  };
  var s = document.createElement('script');
  s.id = 'script_jsonp';
  s.src = GAS_URL + '?code=' + encodeURIComponent(code) + '&callback=' + cb;
  document.body.appendChild(s);
}

// 起動
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code') || '';
  if (code) {
    loadReport(code);
  } else {
    // localStorageから自動取得
    try { code = localStorage.getItem('survey_anon_code') || ''; } catch(e) {}
    if (code) { loadReport(code); } else { showCodeForm(); }
  }
})();
</script>
</body>
</html>
