// --- Send to Google Sheets ---
async function sendToSheets(type,answers,ts){
  if(!GAS_URL)return{skipped:true};
  try{
    await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({type,answers,timestamp:ts}),redirect:"follow"});
    return{success:true};
  }catch(e){console.error("送信エラー:",e);return{success:false,error:e.message};}
}

function Bar({cur,tot}){

  return <div style={{position:"sticky",top:0,zIndex:100,background:P.bgSolid,padding:"12px 0 8px",borderBottom:`1px solid ${P.bdr}`}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13,color:P.mut}}><span>回答の進捗</span><span>{pct}%</span></div>

  </div>;
}

function SQ({item,scale,value,onChange}){
  const n=scale.max-scale.min+1;
  const vals=Array.from({length:n},(_,i)=>scale.min+i);
  const lFirst=scale.labels[0];const lLast=scale.labels[n-1];
  return <div style={{padding:"20px 0",borderBottom:`1px solid ${P.bdr}`}}>
    <p style={{margin:"0 0 14px",fontSize:15,color:P.txt,lineHeight:1.7}}><span style={{color:P.acc,fontWeight:600,marginRight:8,fontSize:13}}>{item.id.toUpperCase()}</span>{item.t}</p>
    <div style={{maxWidth:Math.min(n*56,620)}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        {vals.map((v,i)=>{const sel=value===v;return <div key={v} style={{display:"flex",flexDirection:"column",alignItems:"center",flex:"1 1 0",minWidth:0}}>
          <button onClick={()=>onChange(v)} style={{width:36,height:36,borderRadius:"50%",border:sel?`2px solid ${P.sel}`:`2px solid rgba(255,255,255,0.2)`,background:sel?P.sel:"transparent",color:sel?"#fff":P.mut,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center"}}
            onMouseEnter={e=>{if(!sel){e.target.style.borderColor=P.priL;e.target.style.background=P.selBg}}} onMouseLeave={e=>{if(!sel){e.target.style.borderColor="rgba(255,255,255,0.2)";e.target.style.background="transparent"}}}>{v}</button>
        </div>})}
      </div>
      {(lFirst||lLast)&&<div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <span style={{fontSize:10,color:P.mut,lineHeight:1.3}}>{lFirst}</span>
        <span style={{fontSize:10,color:P.mut,lineHeight:1.3,textAlign:"right"}}>{lLast}</span>
      </div>}
    </div>
  </div>;
}

function CodeGen({value,onChange,isPost}){
  const L2=(s)=>s.toUpperCase().replace(/[^A-Z]/g,"").substring(0,2);
  const parse=(v)=>{
    if(v&&v.length>=10){
      const mm=parseInt(v.substring(0,2),10);
      const dd=parseInt(v.substring(2,4),10);
      const city=v.substring(4,6).toUpperCase();
      const fam=v.substring(6,8).toUpperCase();
      const giv=v.substring(8,10).toUpperCase();
      if(!isNaN(mm)&&!isNaN(dd)&&mm>=1&&mm<=12&&dd>=1&&dd<=31
        &&/^[A-Z]{2}$/.test(city)&&/^[A-Z]{2}$/.test(fam)&&/^[A-Z]{2}$/.test(giv))
        return{month:mm.toString(),day:dd.toString(),city,fam,giv};
    }
    return{month:"",day:"",city:"",fam:"",giv:""};
  };
  const p=parse(value);
  const[month,setMonth]=useState(p.month);
  const[day,setDay]=useState(p.day);
  const[city,setCity]=useState(p.city);
  const[fam,setFam]=useState(p.fam);
  const[giv,setGiv]=useState(p.giv);

  const build=(m,d,c,f,g)=>(m&&d&&c.length===2&&f.length===2&&g.length===2)?m.padStart(2,"0")+d.padStart(2,"0")+c+f+g:"";
  const cur=()=>build(month,day,city,fam,giv);

  const onM=(m)=>{setMonth(m);onChange(build(m,day,city,fam,giv));};
  const onD=(d)=>{setDay(d);onChange(build(month,d,city,fam,giv));};
  const onC=(i)=>{const v=L2(i);setCity(v);onChange(build(month,day,v,fam,giv));};
  const onF=(i)=>{const v=L2(i);setFam(v);onChange(build(month,day,city,v,giv));};
  const onG=(i)=>{const v=L2(i);setGiv(v);onChange(build(month,day,city,fam,v));};

  const code=cur();
  const filled=[month,day,city.length===2,fam.length===2,giv.length===2].filter(Boolean).length;
  const sel={width:"100%",padding:"10px 14px",border:`1.5px solid ${P.bdr}`,borderRadius:8,fontSize:15,fontFamily:"'Noto Sans JP',sans-serif",background:"rgba(255,255,255,0.08)",color:P.txt,outline:"none",cursor:"pointer"};
  const inp=(val,fn,ph)=><input type="text" value={val} onChange={e=>fn(e.target.value)} maxLength={2}
    placeholder={ph} style={{...sel,textTransform:"uppercase",cursor:"text",letterSpacing:2}}
    onFocus={e=>e.target.style.borderColor=P.pri} onBlur={e=>e.target.style.borderColor=P.bdr}/>;

  const seg=(txt,active)=><span style={{color:active?P.priL:"rgba(255,255,255,0.25)",transition:"color 0.2s"}}>{txt}</span>;

  return <div>

  if(q.type==="text"||q.type==="number")return <div style={{marginBottom:24}}>
    <label style={{display:"block",fontSize:15,color:P.txt,marginBottom:8,lineHeight:1.7}}><span style={{color:P.acc,fontWeight:600,marginRight:8,fontSize:13}}>{q.id.toUpperCase()}</span>{q.label}</label>

  </div>;
  if(q.type==="textarea")return <div style={{marginBottom:24}}>
    <label style={{display:"block",fontSize:15,color:P.txt,marginBottom:8,lineHeight:1.7}}><span style={{color:P.acc,fontWeight:600,marginRight:8,fontSize:13}}>{q.id.toUpperCase()}</span>{q.label}</label>

  if(q.type==="radio")return <div style={{marginBottom:24}}>
    <p style={{fontSize:15,color:P.txt,marginBottom:10,lineHeight:1.7}}><span style={{color:P.acc,fontWeight:600,marginRight:8,fontSize:13}}>{q.id.toUpperCase()}</span>{q.label}</p>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {q.opts.map((o,i)=>{const s=value===o;return <label key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderRadius:8,cursor:"pointer",transition:"all 0.15s",background:s?P.selBg:"transparent",border:`1.5px solid ${s?P.pri:"transparent"}`,fontSize:14}}>
        <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${s?P.pri:P.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s&&<div style={{width:10,height:10,borderRadius:"50%",background:P.pri}}/>}</div>
        <span style={{color:P.txt}}>{o}</span><input type="radio" name={q.id} checked={s} onChange={()=>onChange(o)} style={{display:"none"}}/>
      </label>})}
      {q.hasOther&&value===q.opts[q.otherIdx]&&<input type="text" value={ov||""} onChange={e=>onOv(e.target.value)} placeholder="具体的にお書きください" style={{...fs,maxWidth:300,marginLeft:42}} onFocus={e=>e.target.style.borderColor=P.pri} onBlur={e=>e.target.style.borderColor=P.bdr}/>}
    </div>
  </div>;
  if(q.type==="checkbox"){const sel=value||[];return <div style={{marginBottom:24}}>
    <p style={{fontSize:15,color:P.txt,marginBottom:10,lineHeight:1.7}}><span style={{color:P.acc,fontWeight:600,marginRight:8,fontSize:13}}>{q.id.toUpperCase()}</span>{q.label}</p>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {q.opts.map((o,i)=>{const c=sel.includes(o);return <label key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderRadius:8,cursor:"pointer",transition:"all 0.15s",background:c?P.selBg:"transparent",border:`1.5px solid ${c?P.pri:"transparent"}`,fontSize:14}}>
        <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${c?P.pri:P.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:c?P.pri:"transparent"}}>{c&&<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2" fill="none"/></svg>}</div>
        <span style={{color:P.txt}}>{o}</span><input type="checkbox" checked={c} onChange={()=>{const nx=c?sel.filter(s=>s!==o):[...sel,o];onChange(nx)}} style={{display:"none"}}/>
      </label>})}
      {q.hasOther&&sel.includes(q.opts[q.otherIdx])&&<input type="text" value={ov||""} onChange={e=>onOv(e.target.value)} placeholder="具体的にお書きください" style={{...fs,maxWidth:300,marginLeft:42}} onFocus={e=>e.target.style.borderColor=P.pri} onBlur={e=>e.target.style.borderColor=P.bdr}/>}
    </div>
  </div>;}
  return null;
}

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>トップに戻る
        </button>
        <h1 style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:22,color:"rgba(255,255,255,0.85)",margin:0,fontWeight:500}}>{isPre?"ゲーム体験前のご質問":"ゲーム体験後のご質問"}</h1>
      </div>

      {showErrBanner&&<div style={{background:"rgba(240,112,112,0.12)",border:"1px solid rgba(240,112,112,0.3)",borderRadius:10,padding:"14px 20px",marginBottom:24}}>
        <p style={{color:P.err,fontSize:14,margin:0,fontWeight:500}}>未回答の必須項目が {missingCount} 件あります。ご確認ください。</p>
      </div>}

      <div style={{background:P.card,border:`1px solid ${P.bdr}`,borderRadius:10,padding:"20px 24px",marginBottom:32}}>
        <h3 style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:13,color:P.acc,margin:"0 0 16px",fontWeight:600}}>{"Q1"}</h3>
        {(isPre?PRE.demo:POST.code).map(q=>{
          const fieldErr=errs===true&&missing.includes(q.id);
          return <div key={q.id} id={`f-${q.id}`}>
            <DQ q={q} value={ans[q.id]} onChange={v=>sa(q.id,v)} ov={oth[q.id]} onOv={v=>so(q.id,v)}/>
            {fieldErr&&<p style={{color:P.err,fontSize:12,margin:"-16px 0 16px",fontWeight:500}}>{q.type==="code"?"すべての項目を入力してコードを生成してください":"この項目は必須です"}</p>}
          </div>;
        })}
      </div>

      {isPre?<>
        <div id="f-q10"><SS section={PRE.swls} answers={ans} set={sa}/></div>
        <div id="f-q18"><SS section={PRE.cses} answers={ans} set={sa}/></div>
        <div id="f-q31"><SS section={PRE.srgs} answers={ans} set={sa}/></div>
        <div id="f-q46"><SS section={PRE.apts} answers={ans} set={sa}/></div>
      </>:<>
        <div id="f-q2"><SS section={POST.swls} answers={ans} set={sa}/></div>
        <div id="f-q10"><SS section={POST.cses} answers={ans} set={sa}/></div>
        <div id="f-q23"><SS section={POST.srgs} answers={ans} set={sa}/></div>
        <div id="f-q38"><SS section={POST.arcs} answers={ans} set={sa}/></div>
        <div style={{background:P.card,border:`1px solid ${P.bdr}`,borderRadius:10,padding:"20px 24px",marginBottom:32}}>
          {POST.open.map(q=><div key={q.id} id={`f-${q.id}`}><DQ q={q} value={ans[q.id]} onChange={v=>sa(q.id,v)}/></div>)}
        </div>
      </>}

      <div style={{textAlign:"center",padding:"20px 0 40px"}}>
        <p style={{fontSize:13,color:P.mut,marginBottom:16}}>すべての回答を入力したら、「完了」ボタンを押してください。</p>
        <button onClick={submit} disabled={saving} style={{padding:"14px 48px",background:P.pri,color:"#fff",border:"none",borderRadius:10,fontSize:16,fontWeight:600,cursor:saving?"wait":"pointer",transition:"all 0.2s",opacity:saving?0.7:1,boxShadow:"0 2px 12px rgba(91,138,240,0.3)"}}
          onMouseEnter={e=>{if(!saving)e.target.style.background=P.priL}} onMouseLeave={e=>{if(!saving)e.target.style.background=P.pri}}>{saving?"送信中...":"完了"}</button>
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
